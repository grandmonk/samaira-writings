
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orbit Archive</title>

<style>
body {
    margin:0;
    background:#f4f3ef;
    font-family: sans-serif;
}

#hero {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* 🌍 EARTH */
.earth {
    width:240px;
    height:240px;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    box-shadow:
        inset -25px -25px 50px rgba(0,0,0,0.2),
        inset 15px 15px 30px rgba(255,255,255,0.2);
}

.earth::before {
    content:"";
    position:absolute;
    width:200%;
    height:100%;
    background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/Equirectangular_projection_SW.jpg") repeat-x;
    background-size:cover;
    animation:spinEarth 40s linear infinite;
}

@keyframes spinEarth {
    from { transform:translateX(0); }
    to { transform:translateX(-50%); }
}

/* ORBITS */
.orbit-wrap {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.orbit {
    position:absolute;
    top:50%;
    left:50%;
    border-radius:50%;
    border:1px solid rgba(0,0,0,0.1);
    transform:translate(-50%,-50%);
    animation:spin linear infinite;
}

@keyframes spin {
    from { transform:translate(-50%,-50%) rotate(0deg); }
    to { transform:translate(-50%,-50%) rotate(360deg); }
}

/* SATELLITES */
.satellite {
    position:absolute;
    top:50%;
    left:50%;
    background:white;
    padding:5px 10px;
    border-radius:20px;
    font-size:10px;
    display:flex;
    gap:5px;
    cursor:pointer;
}

.satellite:hover {
    background:black;
    color:white;
}

.fruit {
    font-size:1.2rem;
}

main {
    max-width:700px;
    margin:auto;
    padding:40px;
}

article {
    margin:80px 0;
}
</style>
</head>

<body>

<div id="hero">
    <div class="earth"></div>
    <div class="orbit-wrap">
        
        <div class="orbit" style="width:360px;height:360px;animation-duration:18s;">
            
            <div class="satellite"
                 style="transform: rotate(0.0deg) translateY(-180.0px) rotate(-0.0deg);"
                 onclick="document.getElementById('art-0').scrollIntoView({behavior:'smooth'})">
                <span class="fruit">🍎</span>
                <span>Don't Blame the Player, Blame the Deck</span>
            </div>
            
            <div class="satellite"
                 style="transform: rotate(180.0deg) translateY(-180.0px) rotate(-180.0deg);"
                 onclick="document.getElementById('art-0').scrollIntoView({behavior:'smooth'})">
                <span class="fruit">🍊</span>
                <span>Don't Blame the Player, Blame the Deck</span>
            </div>
            
        </div>
        
        <div class="orbit" style="width:470px;height:470px;animation-duration:23s;">
            
            <div class="satellite"
                 style="transform: rotate(0.0deg) translateY(-235.0px) rotate(-0.0deg);"
                 onclick="document.getElementById('art-1').scrollIntoView({behavior:'smooth'})">
                <span class="fruit">🍊</span>
                <span>Bananas, Balloons, and the Price of Nothing</span>
            </div>
            
            <div class="satellite"
                 style="transform: rotate(120.0deg) translateY(-235.0px) rotate(-120.0deg);"
                 onclick="document.getElementById('art-1').scrollIntoView({behavior:'smooth'})">
                <span class="fruit">🍋</span>
                <span>Bananas, Balloons, and the Price of Nothing</span>
            </div>
            
            <div class="satellite"
                 style="transform: rotate(240.0deg) translateY(-235.0px) rotate(-240.0deg);"
                 onclick="document.getElementById('art-1').scrollIntoView({behavior:'smooth'})">
                <span class="fruit">🍌</span>
                <span>Bananas, Balloons, and the Price of Nothing</span>
            </div>
            
        </div>
        
    </div>
</div>
